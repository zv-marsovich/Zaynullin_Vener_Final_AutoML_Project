name: ML Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn optuna mlflow xgboost catboost lightgbm joblib psutil pytest

    - name: Create test data
      run: |
        mkdir -p data
        python -c "import pandas as pd; pd.DataFrame({
            'price': [1000,2000,3000,4000,5000],
            'model': ['Audi','BMW','MB','Audi','BMW'],
            'fuel_type': ['petrol','diesel','petrol','diesel','petrol'],
            'vehicle_type': ['car','bus','car','bus','car'],
            'gearbox': ['manual','auto','manual','auto','manual'],
            'repaired': ['yes','no','yes','no','yes'],
            'power': [100,150,120,180,130],
            'registration_year': [2010,2011,2012,2013,2014],
            'brand': ['Audi','BMW','MB','Audi','BMW']
        }).to_csv('data/autos.csv', index=False)"

    - name: Run tests
      run: |
        pytest tests/ -v

  docker-build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        docker build -t automl-project:latest .
        docker images